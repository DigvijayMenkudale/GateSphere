<style>

    .gs-doc-richtext code {

    .gs-doc-richtext pre {

        border-radius: 6px;
        padding: 2px 6px;

        background: transparent;
        color: inherit;
        padding: 0;
    }

    .gs-doc-richtext table {
        width: 100%;
        overflow: hidden;
        border-collapse: collapse;
        border-radius: 14px;
        border: 1px solid #e5ebf3;
    }

    .gs-doc-richtext th,
    .gs-doc-richtext td {
        padding: 12px 14px;
        border-bottom: 1px solid #edf1f6;
        text-align: left;
        vertical-align: top;
    }

    .gs-doc-richtext th {
        background: #f8fafc;
        color: #667085;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
    }

        border-left: 4px solid #4f67ff;
        border-radius: 0 14px 14px 0;

        color: #4a5565;

        border-radius: 14px;
        padding: 14px;
        color: #657184;
        font-size: 13px;
    }

    .gs-doc-reveal {
        opacity: 0;
        transform: translateY(24px);

    }

    .gs-doc-reveal.is-visible {
